# Secret Configurations Import
spring.config.import=optional:classpath:application-secret.properties

# Database Connection Configuration
# TODO: 본인의 MySQL 포트, 데이터베이스명(golf_screen), 사용자명(username), 비밀번호(password)에 맞게 수정하세요.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/golf_screen?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Hibernate 6+ 에서는 MySQLDialect가 자동으로 감지되지만, 명시적으로 선언할 수도 있습니다.
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# PortOne V2 API Configurations
# TODO: 포트원 V2 관리자 콘솔(결제 연동 -> API Keys)에서 발급받은 API Secret을 여기에 입력하세요.
portone.api.secret=YOUR_PORTONE_API_SECRET

# File Upload Configurations
# 파일 저장 기본 폴더 경로 (프로젝트 루트의 uploads 폴더)
file.upload-dir=uploads
# 스프링 기본 멀티파트 업로드 크기 제한 설정
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OAuth2 Client Configurations
# Google
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email

# Kakao
spring.security.oauth2.client.registration.kakao.client-id=YOUR_KAKAO_CLIENT_ID
spring.security.oauth2.client.registration.kakao.client-secret=YOUR_KAKAO_CLIENT_SECRET
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email

# Kakao Provider
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# Kakao Local API Configuration
kakao.api.key=${KAKAO_API_KEY:YOUR_KAKAO_REST_KEY}
